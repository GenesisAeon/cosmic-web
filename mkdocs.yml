site_name: cosmic-web
site_description: The Cosmic Web Relational Network — Barabási–Albert graph + emergence simulation for the GenesisAeon stack
site_author: GenesisAeon
repo_url: https://github.com/GenesisAeon/cosmic-web
repo_name: GenesisAeon/cosmic-web

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: .

nav:
  - Home: index.md
  - CLI Reference: cli.md
  - Changelog: changelog.md
